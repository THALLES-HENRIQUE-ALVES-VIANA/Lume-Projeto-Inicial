<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="login.css">
    <!-- icones -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <main>
        <div class="container">
            <h1>Login</h1>
            <form action="">
                <div class="input-box">
                    <label for="nome">Insira seu nome: </label>
                    <input type="text" placeholder="Ex.: José da Silva">
                </div>
                <div class="input-box">
                    <label for="email">Insira seu e-mail:</label>
                    <input type="email" placeholder="Ex.: josedasilva43@gmail.com">
                </div>
                <div class="senha">
                    <div class="guardar-senha">
                        <input type="checkbox">
                        <label>Guardar senha</label>
                    </div>
                    <a href="">Esqueceu a senha?</a>
                </div>
                <div class="enviar">
                    <button class="button" type="submit">Enviar</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
